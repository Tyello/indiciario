<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>{{TITULO}}</title>
  <style>
    @page { size: A4 landscape; margin: 7mm; }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #fff; color: #111; font-family: Arial, Helvetica, sans-serif; }
    body { width: 100%; }
    header { display: flex; justify-content: space-between; gap: 12mm; align-items: flex-end; border-bottom: 1.6px solid #111; padding-bottom: 3mm; margin-bottom: 3mm; }
    h1 { margin: 0; font-size: 15px; letter-spacing: .06em; text-transform: uppercase; }
    .subtitle { margin-top: 1mm; font-size: 10px; color: #333; }
    .sheet-code { font-family: "Courier New", monospace; font-size: 9px; color: #333; text-align: right; white-space: nowrap; }
    .map { width: 100%; height: 166mm; border: 1px solid #111; padding: 2mm; break-inside: avoid; page-break-inside: avoid; overflow: hidden; }
    .map svg { display: block; width: 100%; height: 100%; }
    footer { margin-top: 2mm; display: flex; justify-content: space-between; font-size: 8.5px; color: #444; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>{{TITULO}}</h1>
      <div class="subtitle">{{SUBTITULO}}</div>
    </div>
    <div class="sheet-code">A4 PAISAGEM · P&B FIRST</div>
  </header>
  <main class="map">{{SVG}}</main>
  <footer>
    <span>Planta operacional simplificada.</span>
    <span>Sem imagem externa; gerar/ imprimir em orientação paisagem.</span>
  </footer>
</body>
</html>
