<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversa - {{NOME_GRUPO}}</title>
<style>
  *, *:before, *:after {
    box-sizing: inherit;
  }

  html {
    box-sizing: border-box;
    min-height: 100%;
    margin: 0;
    padding: 0;
  }

  :root {
    --page-bg: #f2eee8;
    --device-bg: #1f1f1f;
    --device-edge: #151515;
    --screen-bg: #efe7dd;
    --status-bg: #004e45;
    --header-bg: #005e54;
    --header-text: #ffffff;
    --header-muted: rgba(255, 255, 255, 0.78);
    --msg-sent: #e1ffc7;
    --msg-received: #ffffff;
    --msg-text: #000000;
    --meta: rgba(0, 0, 0, 0.45);
    --tick: #4fc3f7;
    --composer-icon: #7d8489;
    --send-bg: #008a7c;
    --date-bg: rgba(225, 245, 254, 0.92);
    --date-text: #54656f;
  }

  body {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    margin: 0;
    padding: 24px 0;
    background: var(--page-bg);
    color: var(--msg-text);
    font-family: "Segoe UI", Helvetica, Arial, sans-serif;
  }

  .page {
    width: 100%;
    min-height: calc(100vh - 48px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .marvel-device.nexus5 {
    width: 360px;
    background: var(--device-bg);
    border-radius: 30px;
    padding: 52px 12px 58px;
    position: relative;
    box-shadow: 0 22px 70px rgba(0, 0, 0, 0.58);
  }

  .top-bar,
  .sleep,
  .volume,
  .camera {
    position: absolute;
    background: var(--device-edge);
  }

  .top-bar {
    width: 70px;
    height: 7px;
    border-radius: 7px;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
  }

  .sleep {
    width: 4px;
    height: 52px;
    right: -4px;
    top: 115px;
    border-radius: 0 4px 4px 0;
  }

  .volume {
    width: 4px;
    height: 88px;
    left: -4px;
    top: 145px;
    border-radius: 4px 0 0 4px;
  }

  .camera {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    top: 23px;
    left: 92px;
    background: #0a0a0a;
    border: 2px solid #2a2a2a;
  }

  .marvel-device .screen {
    height: 610px;
    overflow: hidden;
    text-align: left;
    background: var(--screen-bg);
    border-radius: 3px;
  }

  .screen-container,
  .chat-container {
    height: 100%;
  }

  .status-bar {
    height: 25px;
    background: var(--status-bg);
    color: var(--header-text);
    font-size: 14px;
    padding: 0 8px;
  }

  .status-bar:after,
  .user-bar:after,
  .conversation .conversation-container:after {
    content: "";
    display: table;
    clear: both;
  }

  .status-bar div {
    float: right;
    position: relative;
    top: 50%;
    transform: translateY(-50%);
    margin: 0 0 0 8px;
    font-weight: 600;
  }

  .status-bar .status-time {
    float: left;
    margin: 0;
    font-size: 12px;
  }

  .status-icon svg,
  .icon svg {
    display: block;
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  .chat {
    height: calc(100% - 25px);
  }

  .user-bar {
    height: 55px;
    background: var(--header-bg);
    color: var(--header-text);
    padding: 0 8px;
    font-size: 24px;
    position: relative;
    z-index: 1;
  }

  .user-bar div {
    float: left;
    transform: translateY(-50%);
    position: relative;
    top: 50%;
  }

  .user-bar .actions {
    float: right;
    margin: 0 0 0 20px;
    color: var(--header-text);
  }

  .user-bar .actions.more {
    margin: 0 12px 0 32px;
  }

  .user-bar .actions.attachment {
    margin: 0 0 0 30px;
  }

  .user-bar .actions.attachment svg {
    transform: rotate(-45deg);
  }

  .back {
    width: 22px;
  }

  .user-bar .avatar {
    margin: 0 0 0 5px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #d5e8e6;
    color: var(--header-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.1);
  }

  .avatar svg {
    width: 24px;
    height: 24px;
    fill: currentColor;
  }

  .user-bar .name {
    font-size: 17px;
    font-weight: 600;
    text-overflow: ellipsis;
    letter-spacing: 0.3px;
    margin: 0 0 0 8px;
    overflow: hidden;
    white-space: nowrap;
    width: 128px;
  }

  .user-bar .status {
    display: block;
    color: var(--header-muted);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conversation {
    height: calc(100% - 55px);
    position: relative;
    z-index: 0;
    background-color: var(--screen-bg);
    background-image:
      radial-gradient(circle at 12px 18px, rgba(0, 0, 0, 0.035) 0 2px, transparent 2px),
      radial-gradient(circle at 44px 42px, rgba(0, 0, 0, 0.025) 0 2px, transparent 2px),
      linear-gradient(135deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0));
    background-size: 64px 64px, 64px 64px, 100% 100%;
  }

  .conversation .conversation-container {
    height: calc(100% - 68px);
    box-shadow: inset 0 10px 10px -10px #000000;
    overflow: hidden;
    padding: 0 16px;
    margin-bottom: 5px;
  }

  .date-separator {
    clear: both;
    text-align: center;
    margin: 12px 0 8px;
  }

  .date-separator span {
    display: inline-block;
    background: var(--date-bg);
    color: var(--date-text);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 7px;
    box-shadow: 0 1px 0.5px rgba(0, 0, 0, 0.13);
  }

  .message {
    clear: both;
    color: var(--msg-text);
    line-height: 18px;
    font-size: 15px;
    padding: 8px;
    position: relative;
    margin: 8px 0;
    max-width: 85%;
    word-wrap: break-word;
    box-shadow: 0 1px 0.5px rgba(0, 0, 0, 0.16);
  }

  .message:after {
    position: absolute;
    content: "";
    width: 0;
    height: 0;
    border-style: solid;
  }

  .message:first-of-type {
    margin-top: 16px;
  }

  .message.in,
  .message.received {
    background: var(--msg-received);
    border-radius: 0 5px 5px 5px;
    float: left;
  }

  .message.in:after,
  .message.received:after {
    border-width: 0 10px 10px 0;
    border-color: transparent var(--msg-received) transparent transparent;
    top: 0;
    left: -10px;
  }

  .message.out,
  .message.sent {
    background: var(--msg-sent);
    border-radius: 5px 0 5px 5px;
    float: right;
  }

  .message.out:after,
  .message.sent:after {
    border-width: 0 0 10px 10px;
    border-color: transparent transparent transparent var(--msg-sent);
    top: 0;
    right: -10px;
  }

  .message.gap {
    margin-top: 12px;
  }

  .sender-name-label {
    color: #039be5;
    display: block;
    font-size: 12.6px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .message.out .sender-name-label,
  .message.sent .sender-name-label {
    display: none;
  }

  .bubble {
    display: inline;
  }

  .metadata {
    display: inline-block;
    float: right;
    padding: 0 0 0 7px;
    position: relative;
    bottom: -4px;
  }

  .message.in .metadata,
  .message.received .metadata {
    padding: 0 0 0 16px;
  }

  .metadata .time {
    color: var(--meta);
    font-size: 11px;
    display: inline-block;
    white-space: nowrap;
  }

  .metadata .tick {
    color: var(--tick);
    display: inline-block;
    margin-left: 2px;
    position: relative;
    top: 4px;
    min-width: 12px;
    height: 16px;
    line-height: 12px;
  }

  .metadata .tick svg {
    width: 16px;
    height: 15px;
    fill: currentColor;
    vertical-align: top;
  }

  .color-1 { color: #039be5; }
  .color-2 { color: #e91e63; }
  .color-3 { color: #f57c00; }
  .color-4 { color: #43a047; }
  .color-5 { color: #8e24aa; }
  .color-6 { color: #00897b; }

  .conversation-compose {
    display: flex;
    flex-direction: row;
    align-items: flex-end;
    overflow: hidden;
    height: 50px;
    width: 100%;
    z-index: 2;
  }

  .conversation-compose div,
  .conversation-compose .input-msg {
    background: #ffffff;
    height: 100%;
  }

  .conversation-compose .emoji {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    color: var(--composer-icon);
    border-radius: 5px 0 0 5px;
    flex: 0 0 auto;
    margin-left: 8px;
    width: 48px;
  }

  .conversation-compose .input-msg {
    border: 0;
    flex: 1 1 auto;
    color: #6f777c;
    font-size: 16px;
    line-height: 50px;
    margin: 0;
    outline: none;
    min-width: 50px;
  }

  .conversation-compose .photo {
    flex: 0 0 auto;
    border-radius: 0 0 5px 0;
    color: var(--composer-icon);
    text-align: center;
    position: relative;
    width: 48px;
  }

  .conversation-compose .photo:after {
    border-width: 0 0 10px 10px;
    border-color: transparent transparent transparent #ffffff;
    border-style: solid;
    position: absolute;
    width: 0;
    height: 0;
    content: "";
    top: 0;
    right: -10px;
  }

  .conversation-compose .photo .icon,
  .conversation-compose .emoji .icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }

  .conversation-compose .photo svg,
  .conversation-compose .emoji svg {
    width: 24px;
    height: 24px;
  }

  .conversation-compose .send {
    background: transparent;
    border: 0;
    cursor: default;
    flex: 0 0 auto;
    margin-left: 8px;
    margin-right: 8px;
    padding: 0;
    position: relative;
    outline: none;
    height: 50px;
  }

  .conversation-compose .send .circle {
    background: var(--send-bg);
    border-radius: 50%;
    color: var(--header-text);
    position: relative;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .conversation-compose .send .circle svg {
    width: 24px;
    height: 24px;
    margin-left: 5px;
  }

  @media (max-width: 768px) {
    body {
      padding: 0;
    }

    .page {
      min-height: 100vh;
    }

    .marvel-device.nexus5 {
      border-radius: 0;
      flex: none;
      padding: 0;
      max-width: none;
      overflow: hidden;
      height: 100vh;
      width: 100%;
      box-shadow: none;
      background: transparent;
    }

    .top-bar,
    .sleep,
    .volume,
    .camera,
    .marvel-device .status-bar {
      display: none;
    }

    .marvel-device .screen {
      height: 100vh;
      border-radius: 0;
    }

    .screen-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .chat {
      height: 100%;
    }

    .conversation {
      height: calc(100vh - 55px);
    }

    .conversation .conversation-container {
      height: calc(100vh - 123px);
    }
  }
</style>
</head>
<body>
<div class="page">
  <div class="phone-shell marvel-device nexus5">
    <div class="top-bar"></div>
    <div class="sleep"></div>
    <div class="volume"></div>
    <div class="camera"></div>
    <div class="phone-screen screen">
      <div class="screen-container">
        <div class="status-bar">
          <div class="status-time">{{HORA_TELA}}</div>
          <div class="status-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h10a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1zm2 14h6V6H9v12z"/></svg>
          </div>
          <div class="status-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9.5C8.1 4.9 15.9 4.9 21 9.5l-2.1 2.1c-3.9-3.2-9.9-3.2-13.8 0L3 9.5zm4.2 4.2c2.7-2.1 6.9-2.1 9.6 0L14.6 16c-1.5-1-3.7-1-5.2 0l-2.2-2.3zM12 20l-2.1-2.1c1.2-.8 3-.8 4.2 0L12 20z"/></svg>
          </div>
          <div class="status-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19h2v-5H4v5zm4 0h2v-8H8v8zm4 0h2V8h-2v11zm4 0h2V5h-2v14z"/></svg>
          </div>
          <div class="status-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 17.3L18.2 21l-1.6-7.1L22 9.2l-7.2-.6L12 2 9.2 8.6 2 9.2l5.4 4.7L5.8 21 12 17.3z"/></svg>
          </div>
        </div>
        <div class="chat">
          <div class="chat-container">
            <div class="user-bar">
              <div class="back">
                <span class="icon">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.8l5.6-5.6L12 4l-8 8 8 8 1.4-1.4L7.8 13H20v-2z"/></svg>
                </span>
              </div>
              <div class="avatar">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 11c1.7 0 3-1.3 3-3s-1.3-3-3-3-3 1.3-3 3 1.3 3 3 3zM8 11c1.7 0 3-1.3 3-3S9.7 5 8 5 5 6.3 5 8s1.3 3 3 3zm0 2c-2.3 0-7 1.2-7 3.5V19h14v-2.5C15 14.2 10.3 13 8 13zm8 0c-.3 0-.7 0-1.1.1 1.2.9 2.1 2 2.1 3.4V19h6v-2.5c0-2.3-4.7-3.5-7-3.5z"/></svg>
              </div>
              <div class="name">
                <span>{{NOME_GRUPO}}</span>
                <span class="status">{{MEMBROS_LISTA}}</span>
              </div>
              <div class="actions more">
                <span class="icon">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                </span>
              </div>
              <div class="actions attachment">
                <span class="icon">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16.5 6v11.5a4.5 4.5 0 0 1-9 0V5a3 3 0 0 1 6 0v10.5a1.5 1.5 0 0 1-3 0V6H9v9.5a3 3 0 0 0 6 0V5a4.5 4.5 0 0 0-9 0v12.5a6 6 0 0 0 12 0V6h-1.5z"/></svg>
                </span>
              </div>
              <div class="actions">
                <span class="icon">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8a15.1 15.1 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.2c1.1.4 2.3.6 3.6.6a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C10.6 21 3 13.4 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.2.2 2.5.6 3.6a1 1 0 0 1-.3 1l-2.2 2.2z"/></svg>
                </span>
              </div>
            </div>

            <div class="conversation">
              <div class="conversation-container">
                <div class="date-separator"><span>{{DATA_CONVERSA}}</span></div>

                {{#MENSAGENS}}
                <div class="message {{DIRECAO}} {{CLASSE_GAP}}">
                  {{#MOSTRAR_NOME}}<span class="sender-name-label {{COR_REMETENTE}}">{{NOME_REMETENTE}}</span>{{/MOSTRAR_NOME}}
                  <span class="bubble">{{TEXTO_MENSAGEM}}</span>
                  <span class="metadata">
                    <span class="time">{{HORARIO}}</span>
                    {{#DIRECAO_OUT}}<span class="tick">{{TICKS}}</span>{{/DIRECAO_OUT}}
                  </span>
                </div>
                {{/MENSAGENS}}
              </div>
              <div class="conversation-compose">
                <div class="emoji">
                  <span class="icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.2 11.6c.8 0 1.4-.9 1.4-2s-.6-2-1.4-2-1.5.9-1.5 2 .7 2 1.5 2zm6 0c.8 0 1.4-.9 1.4-2s-.6-2-1.4-2-1.5.9-1.5 2 .7 2 1.5 2zM12 21.4c-5.3 0-9.4-3.9-9.4-9.2S6.6 2.7 11.8 2.7a9.5 9.5 0 0 1 9.6 9.5c0 5.3-4.1 9.2-9.4 9.2zm0-2.9c5.8-.2 6.1-5.5 6.1-5.5-6.1 1.4-12.2 0-12.2 0 0-.3-.1 5.2 6.1 5.5z"/></svg>
                  </span>
                </div>
                <div class="input-msg">Type a message</div>
                <div class="photo">
                  <span class="icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 5h-3.2L15 3H9L7.2 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm-8 13a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-1.8a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4z"/></svg>
                  </span>
                </div>
                <div class="send">
                  <div class="circle">
                    <span class="icon">
                      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
