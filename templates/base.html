<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title | default('Indiciário') }}</title>
  <style>
    :root {
      --paper: #f7f1e6;
      --ink: #161616;
      --muted: #666666;
      --line: #c8bda8;
      --accent: #8b1a1a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13pt;
      line-height: 1.45;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      padding: 16mm;
      margin: 0 auto;
      background: #fffdf8;
    }

    .doc-header {
      border-bottom: 2px solid var(--line);
      margin-bottom: 12mm;
      padding-bottom: 4mm;
    }

    .doc-code {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .doc-title {
      margin: 2mm 0 0;
      font-size: 22pt;
      line-height: 1.1;
    }

    .doc-meta {
      color: var(--muted);
      font-size: 10pt;
      margin-top: 2mm;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 6mm 0;
      font-size: 10.5pt;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 2.5mm;
      vertical-align: top;
    }

    th {
      background: #eee7d8;
      text-align: left;
    }

    .evidence-card {
      border: 1px solid var(--line);
      padding: 5mm;
      margin: 5mm 0;
      background: #ffffff;
    }

    @page {
      size: A4;
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="doc-header">
      <div class="doc-code">{{ document_code | default('DOC-000') }}</div>
      <h1 class="doc-title">{{ title | default('Documento de evidência') }}</h1>
      <div class="doc-meta">
        {{ document_type | default('Tipo não informado') }} · {{ envelope | default('Envelope não informado') }}
      </div>
    </header>

    {% block content %}
    <section class="evidence-card">
      <p>Conteúdo do documento.</p>
    </section>
    {% endblock %}
  </main>
</body>
</html>
