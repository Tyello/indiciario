<!doctype html>
<!--
  ISSUE-40.3 (Sistema de Camadas), decisão de STEP-03: `base.html` é órfão —
  nenhum template `{% extends %}` este arquivo, e `generator/renderer.py`
  não o carrega (motor de render real é substituição por string sobre cada
  `.html` standalone, achado do STEP-01: `.ai/runs/ISSUE-40.3/STEP-01_EXECUTION.md`).
  Chrome de jogo (`doc-code`, título, "Envelope N") impresso abaixo é
  Camada 0 por definição, exatamente porque nunca é herdado por templates
  diegéticos de Camada 1/2 -- não introduzir flag `SHOW_GAME_CHROME` nem
  extrair partial: seria mecanismo novo para um problema que não existe no
  pipeline ativo. Mantido como scaffold/exemplo documentado, não deletado.
-->
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title | default('Indiciário') }}</title>
  <style>
    :root {
      --paper: #f7f1e6;
      --ink: #161616;
      --muted: #666666;
      --line: #c8bda8;
    }

    /* Marca Indiciário (ISSUE-40.5): --accent só existe dentro do escopo
       .camada-0 (envelope, protocolo, dicas, gabarito). Documentos
       diegéticos (Camada 1/2) não herdam esta variável -- não a declare
       em :root global. */
    .camada-0 {
      --accent: #8b1a1a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13pt;
      line-height: 1.45;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      padding: 16mm;
      margin: 0 auto;
      background: #fffdf8;
    }

    .doc-header {
      border-bottom: 2px solid var(--line);
      margin-bottom: 12mm;
      padding-bottom: 4mm;
    }

    .doc-code {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .doc-title {
      margin: 2mm 0 0;
      font-size: 22pt;
      line-height: 1.1;
    }

    .doc-meta {
      color: var(--muted);
      font-size: 10pt;
      margin-top: 2mm;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 6mm 0;
      font-size: 10.5pt;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 2.5mm;
      vertical-align: top;
    }

    th {
      background: #eee7d8;
      text-align: left;
    }

    .evidence-card {
      border: 1px solid var(--line);
      padding: 5mm;
      margin: 5mm 0;
      background: #ffffff;
    }

    @page {
      size: A4;
      margin: 0;
    }
  </style>
</head>
<body class="camada-0">
  <main class="page">
    <header class="doc-header">
      <div class="doc-code">{{ document_code | default('DOC-000') }}</div>
      <h1 class="doc-title">{{ title | default('Documento de evidência') }}</h1>
      <div class="doc-meta">
        {{ document_type | default('Tipo não informado') }} · {{ envelope | default('Envelope não informado') }}
      </div>
    </header>

    {% block content %}
    <section class="evidence-card">
      <p>Conteúdo do documento.</p>
    </section>
    {% endblock %}
  </main>
</body>
</html>
