<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>{{TITULO}}</title>
  <style>
    @page { size: A4 landscape; margin: 8mm; }
    * { box-sizing: border-box; }
    body { margin: 0; color: #111827; font-family: Arial, Helvetica, sans-serif; background: #fff; }
    header { border-bottom: 2px solid #111827; margin-bottom: 5px; padding-bottom: 4px; }
    h1 { margin: 0; font-size: 18px; letter-spacing: .04em; text-transform: uppercase; }
    .subtitle { margin-top: 4px; color: #4b5563; font-size: 12px; }
    .map { width: 100%; border: 1px solid #9ca3af; padding: 3px; break-inside: avoid; page-break-inside: avoid; }
    .map svg { display: block; width: 100%; height: 145mm; }
    footer { margin-top: 4px; font-size: 10px; color: #4b5563; }
  </style>
</head>
<body>
  <header>
    <h1>{{TITULO}}</h1>
    <div class="subtitle">{{SUBTITULO}}</div>
  </header>
  <main class="map">{{SVG}}</main>
  <footer>Visual procedural gerado por dados estruturados do blueprint. Sem imagem externa.</footer>
</body>
</html>
