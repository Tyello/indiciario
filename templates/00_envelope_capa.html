<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{section_label}} — {{case_name}}</title>
  <style>
    @page { size: A4; margin: 0; }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 210mm;
      height: 297mm;
      font-family: "Courier New", Courier, monospace;
      background: #b89463;
      color: #2d1f12;
    }

    .pagina {
      width: 100%;
      height: 100%;
      padding: 20mm;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(0, 0, 0, 0.08)),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.03) 0 2px, rgba(0, 0, 0, 0.03) 2px 4px),
        #b89463;
      border: 2.5mm solid #7d5a37;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .pagina::before,
    .pagina::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .pagina::before {
      background:
        linear-gradient(145deg, transparent 48%, rgba(70, 44, 20, 0.08) 49%, rgba(70, 44, 20, 0.08) 51%, transparent 52%),
        linear-gradient(35deg, transparent 58%, rgba(70, 44, 20, 0.08) 59%, rgba(70, 44, 20, 0.08) 61%, transparent 62%);
    }

    .pagina::after {
      box-shadow: inset 0 0 0 4mm rgba(84, 54, 30, 0.2), inset 0 0 22mm rgba(0, 0, 0, 0.18);
    }

    .arquivo {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border: 1.5mm solid rgba(45, 31, 18, 0.5);
      padding: 16mm;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 10mm;
      background: rgba(255, 255, 255, 0.08);
    }

    .etiqueta {
      font-size: 12pt;
      letter-spacing: 1.1mm;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .caso {
      font-size: 28pt;
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1.2;
      max-width: 150mm;
    }

    .envelope {
      font-size: 24pt;
      letter-spacing: 1mm;
      border: 1.2mm dashed rgba(45, 31, 18, 0.6);
      padding: 7mm 12mm;
      text-transform: uppercase;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.18);
    }

    .modo {
      font-size: 13pt;
      letter-spacing: 0.7mm;
      font-weight: 700;
      text-transform: uppercase;
    }

    .carimbo {
      position: absolute;
      top: 18mm;
      right: 12mm;
      transform: rotate(-11deg);
      border: 1.2mm solid rgba(120, 24, 24, 0.8);
      color: rgba(120, 24, 24, 0.88);
      padding: 3mm 5mm;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6mm;
      background: rgba(255, 255, 255, 0.25);
    }

    .rodape {
      position: absolute;
      bottom: 8mm;
      left: 16mm;
      right: 16mm;
      font-size: 9.2pt;
      text-transform: uppercase;
      letter-spacing: 0.4mm;
      text-align: center;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main class="pagina">
    <section class="arquivo">
      <div class="etiqueta">Dossiê de Investigação</div>
      <div class="caso">{{case_name}}</div>
      <div class="envelope">{{section_label}}</div>
      <div class="modo">{{section_ref}}</div>
      <div class="carimbo">{{warning_label}}</div>
    </section>
  </main>
</body>
</html>
